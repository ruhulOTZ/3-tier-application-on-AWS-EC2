# =============================================================================
# Presentation Tier - Nginx config (HTTPS via self-signed cert)
#
# Place at:    /etc/nginx/sites-available/notes-frontend
# Then:        sudo ln -s /etc/nginx/sites-available/notes-frontend \
#                          /etc/nginx/sites-enabled/notes-frontend
#              sudo rm -f /etc/nginx/sites-enabled/default
#              sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   1. Self-signed cert generated by deployment/generate-ssl-cert.sh
#         /etc/ssl/notes/notes.crt
#         /etc/ssl/notes/notes.key
#   2. React build at /var/www/notes-frontend
#   3. Application-tier EC2 reachable on port 3001 (replace APP_TIER_HOST below)
# =============================================================================

upstream notes_app {
    # e.g. 10.0.0.20  (private IP of the Application-tier EC2)
    server APP_TIER_HOST:3001;
}

# --- HTTP -> HTTPS redirect ---------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Redirect every HTTP request to HTTPS
    return 301 https://$host$request_uri;
}

# --- HTTPS server -------------------------------------------------------------
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    # Self-signed cert (see deployment/generate-ssl-cert.sh)
    ssl_certificate     /etc/ssl/notes/notes.crt;
    ssl_certificate_key /etc/ssl/notes/notes.key;

    # Mozilla "intermediate" TLS profile (no DH params needed for ECDHE-only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Built React assets
    root /var/www/notes-frontend;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy /api/* to the application tier (still plain HTTP inside the VPC)
    location /api/ {
        proxy_pass         http://notes_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Cache static assets aggressively
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    access_log /var/log/nginx/notes-access.log;
    error_log  /var/log/nginx/notes-error.log;
}
